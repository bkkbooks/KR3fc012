body:
  text: 乘之冪下衍者字令弦自乘倍之為兩弦冪誤令自乘為四冪其餘開方除之誤開方除之其餘加差於合而半之為股脫差脫之句股弦即高廣邪脫句字邪誤袤孔刻同其實以句股差冪減實誤餘脫差字孔刻同半之開方得弦案此弦字誤當云得句與半較並圖中二弦冪亦當改作二句與半較並冪三十四上衍廣字變二句冪及句股較乘句二段句股較冪一段及誤入脫段句二字今有竹高一丈此去本三尺脫本字末折抵地為弦六字脫以句及股弦並求股故先令句自乘見矩冪誤以先令自乘之冪而半其餘脫其字三百六十八步三誤一今有二人同所立甲南行十步甲誤中此以南行為句此以誤倒邪行為弦下衍並字句弦並七欲知弦者當以股自乘為冪誤句弦率七欲引者當以為冪加差於並而半之為弦以弦減差餘為句誤加並之半為率以率減餘為句率以句弦並為分母句弦並誤可使案母下孔刻有差為分子四字誤永樂大典本無故令句弦並至同其袤也誤故令句弦並者自乘為朱黃方相連之分股乘為靑冪之矩以句弦並為袤差為廣今有相引之直加損同上其圓大體以兩弦為袤句股為廣引橫斷其半為弦率列用率七自乘者句

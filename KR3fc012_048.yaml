body:
  text: 李云大典及宋本無與此合從方亭求圓亭之積八字脫前求方亭之積脫前字今求圓亭之積亦合三乘之脫今字合誤各此圓亭四角圓殺圓亭誤方亭孔刻同三十三分尺之二十六脫尺字今有圓錐方錐下方令自乘令誤今大錐方之積合十二圓矣脫大錐方之積五字亦二百分之一百五十七二誤一今有塹堵雖復椭方椭誤隨袤一百八十六尺八誤六脫六字重尺字屋蓋垛下廣五箇五誤九今有陽馬一爲鼈臑臑誤腝下同陽馬居二鼈臑居一脫陽馬居二鼈臑六字鼈臑殊形下孔刻有然字李云衍與此合不純合則難爲之矣脫不字案邪解方棊解誤説設陽馬爲分內設誤故爲其餘兩棊棊誤端孔刻同合成一方焉焉誤馬今有鼈臑鼈臑之見數脫鼈臑如六而一如誤加今有羡除下廣末廣皆塹堵之廣脫末廣孔刻同上廣者脫上廣其於本棊皆一而六於誤餘邪畫方錐之底畫誤盡全爲方錐之半爲下衍中字孔刻同下兩袤相等者者誤知中央塹堵廣六尺央誤尖則大鼈臑出橢皆方錐橢誤隨袤六尺袤誤表兩邪棊底方脫兩邪棊草曰併三廣三誤之今有芻甍袤三尺倍下袤袤竝誤乘以廣乘之以

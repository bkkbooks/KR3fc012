body:
  text: 乘黍價六得錢十二幷之得錢二十二減直錢三十七餘錢十五如菽五而一得三卽菽求麥價以右行菽九負乘菽價三得錢二十七負幷直錢四正得錢三十一爲下實以答三乘答價五得錢十五黍二乘黍價六得錢十二幷之得錢二十七減下實三十一餘錢四如麥一而一得四卽麥價求麻價以第三行答三負乘答價五得錢十五負幷直錢四正得錢十九爲下實以菽四乘菽價三得錢十二減下實十九餘錢七如麻一而一得七爲麻價李校一術細草幷附先以第四行減第三行次以第三行去右行及第二行第四行下位又以減左行下位不足減乃止次以左行減第三行下位次以第三行去左行下位訖廢去第三行次以第四行去左行下位又以減右行下位次以右行去第二行及第四行下位次以第二行減第四行及左行頭位次以第四行減左行菽位不足減乃止次以左行減第二行頭位餘可再半次以第四行去左行及第二行頭位次以第二行去左行頭位餘約之上得五下得三是菽五當答三次以左行去第二行菽位又以減第四行及右行菽位不足減乃止次以右行減第二行頭位不足減乃止次以第二行去右行頭位次以左行去右行頭位餘上得六下得五是爲菽六當黍五次
  hash: sha256:c69b24bb14cb50788da82c536d063633ecb2cd2e82d7f95c2a960e01a9cf9d7b

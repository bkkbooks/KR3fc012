body:
  text: 二行去左行頭位左行麥空菽三百一十斗負答一百八十六斗正上下求等得六十二以約之上得五下得三是為菽五當答三次以左行去第二行菽位第二行餘麥五斗正菽空答四斗負又以減第四行及右行菽位第四行餘麻一斗負麥三斗負菽三斗正答二斗正右行餘麥二斗正菽三斗負答一斗負黍一斗正次以右行減第二行頭位第二行餘麥一斗正菽六斗正答二斗黍二斗負案此條李刻正皆誤負負皆誤正今改次以第二行去右行頭位右行麥空菽十五斗負答三斗正黍五斗正次以左行去右行頭位右行菽空答六斗負黍五斗正是為答六當黍五次以左行去右行答位右行餘菽十斗負答空黍五斗正又各以五約之上為二下為一次以右行去第二行下位第二行餘麥一斗正菽二斗正答二斗負李刻正誤負負誤正以第二行去第四行下位第四行餘麻一斗負麥二斗負菽五斗正又以減左行下位左行餘麥一斗負菽三斗正答一斗負李刻正誤負負誤正次以此字李刻脫左行去第二行下位第二行餘麥三斗正菽四斗負李刻正誤負負誤正是為麥三當菽四次以第二行減第四行下位第四行餘麻一斗負麥一斗正菽一斗正次以第四行去第二行下位第二行餘麻四斗負麥七斗正李刻負誤正正誤負上得四下得七是為麻四當麥七是為相當之率舉矣

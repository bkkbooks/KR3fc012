body:
  text: 故謂二字寸增一兩則以為玉重也脫則以為玉重得一百八十九脫一字積一百七十二兩重十字草曰列置玉石至四十八誤列置玉石玉二十寸石三十四寸少四兩不足維乘得四十八祗求玉者脫者字今有善田善田一十二畝半脫半字以少為善田多為惡田各為實脫各為實惡田一畝七十一錢脫一畝二百二十八錢七分錢之四二誤三四誤五今有黃金銀重一十八斤一十一分斤之四銀誤課實如法得金重脫實分母乘法以除者脫分母乘法為銀兩分母同母下衍故同下衍之餘皆約之者脫者合二斤一十一分斤之五脫下一字通分內子是為十二是誤求通為一百四十三一誤二列金銀數各十八斤脫金銀二十七銀一十八七八下俱有兩字案此是銀之通分數非銀之兩數二兩字誤衍仍用故法七百四除七誤六今有良馬駑馬初日行九十七里七誤九以盈不足維乘至其不盡者而命分原本俱作小字今據孔刻及李校改實如法而一得日數一得誤倒求良馬行者至得駑馬十五日之凡行誤求良馬行者十四益疾里數而半之加良馬初日之行里數以乘日分子如日分母而一所得前良馬凡行里數即得其不盡而命分

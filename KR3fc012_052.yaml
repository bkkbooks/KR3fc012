body:
  text: 輸誤餘孔刻同乙丙十八戶共出一斛九字脫出三錢二千八百七十三分重二字淳風等案脫淳風等則一里僦價也脫價字到輸所所用錢脫一所字孔刻同甲自輸其縣孔刻輸誤出李氏云出當作輸與此合則凡輸粟取僦錢輸誤餘孔刻同故可為均賦之率也率下衍計字計經賦之率至且不妨上下也原本誤作劉注在各以約其戶數為衰注故可為均賦之率也下案中有引合分反衰兩注語其為李注無疑為之戶率四字脫孔刻同此一章皆相與通公共率公誤功孔刻同約子以乘戶率為衰也子誤戶孔刻同合分注曰注誤法且不妨上下也上誤處今有均賦粟一斛二十自輸其縣十下有傭價一日一錢六字孔刻同李氏云甲自輸其縣即不應有傭價經云傭價一日一錢者衍文也往返用六日也往誤用即各得輸所用日也即誤而欲得凡日也欲誤故孔刻凡作幾義得兩通於致一斛之傭直於誤則所賦粟為所有數粟誤乘即二日也二誤一得行一日日誤百加一斛粟斛粟誤石米以六縣算數均者至更不贅述誤作大字今有粟七斗粟有多少之差有上脫粟字孔刻同據率稗糳少而糲多率下衍有字若依本率之分若誤

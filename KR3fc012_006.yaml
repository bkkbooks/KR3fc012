body:
  text: 令誤今今有共買雞人出六不足十六脫人字今有共買牛減盈增不足故得牛價也脫增不足三字孔刻同據李校補注云盈不足相與同其買物者重其字出二百七十七誤九今有共買犬不足數為衆人之差脫足字實如法而得一人得誤約出五文不足九十出五十適足九下脫十字五十誤倒維乘出率為實率誤適四千五百千誤十今有米欲為齊同之意下原本衍為齊同者假令據共買物人出八盈三人出七不足四齊其假令同其盈朒俱十二通計齊則不盈不朒之正數故可以並為之實並盈不足法者齊之三十二者是四假令有盈十二齊之二十一者是三假令而凡朒十二並七假令合為一實故亦並三四為法一百字案此注與題不類蓋誤鈔章首盈不足術注孔刻無今刪又盈不足法曰誤作小字共有七斗二升二誤三假令二斗至有餘二升誤作小字今有垣高九尺各長幾何脫長字欲為齊同之意下原本衍假令據共買物人出八盈三人出七不足四齊盈三朒四之十二通計齊不盈不朒之正數故可並以為實並盈不足為法按齊之三十二者四假令有盈十

body:
  text: 行去其頭位次以第二行減右行頭位次以右行去左行及第二行頭位又去第四行頭位餘可半次以第四行減左行頭位次以左行去第四行及第二行頭位次以第二行去第四行頭位餘約之為法實如法而一得六即黍價以法減第二行得答價左行得菽價右行得麥價第三行麻價凡改八字添二十六字移二十九字草曰先置第四行麻二斗麥五斗菽三斗答九斗黍四斗直錢一百一十二以減第三行麻三斗麥五斗菽七斗答六斗黍四斗直錢一百一十六第三行餘麻一斗菽四斗正答三斗負直錢四正反減第四行第四行麻空麥五斗正菽五斗負答十五斗黍四斗直錢一百四正次置第二行麻七斗麥六斗菽四斗答五斗黍三斗直錢一百二十八以第三行麻一斗菽四斗正答三斗負直錢四正減之第二行麻空麥六斗正菽二十四斗負答二十六斗黍三斗直錢一百正次置右行麻九斗麥七斗菽三斗答二斗黍五斗直錢一百四十左行麻一斗麥三斗菽二斗答八斗黍五斗直錢九十五皆以第三行麻一斗菽四斗正答三斗負錢四正減之右行麻空麥七斗正菽三十三斗負答二十九斗黍五斗直錢一百四正左行麻空麥三斗正菽二斗負答十一斗黍五斗直錢九十一正次以第二行麥六斗正菽二十四斗負答二十六斗黍三斗直錢一百正減右行麥七

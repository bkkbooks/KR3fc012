body:
  text: 小句股弦者四句面之小股股面之小句誤則句股之面中央小句股弦句之小股面面小句其數故可衰下衍之字以句乘未並者以下衍小字孔刻同及其所以成法實下衍之字孔刻作之實則又可以股弦差減句句弦差減股為圓徑誤則圓徑又可以句乘之差並句弦差減股為圓徑孔刻同並句弦差股弦差減弦餘為圓徑十三字脫孔刻同句股求弦案上當有術曰句股相乘倍之為實十字今有邑方不知大小案前術至居一隅之積誤案半方邑令半方自乘出門除之即步令之出門相乘故為半方邑自乘居一隅之積故以為實脫以字今有邑方不知大小自木至邑南至合半以東也誤自木至邑一十四步為句以出北門二十步為弦率北門至西隅為單望半廣數故以出北門乘至南行股以半率乘句之冪然北冪居半以西行故又倍之合東盡之也並出南門步數南下衍北字此術之冪至以為隅外之冪也誤此術之冪東西南北邑自木盡邑南十四步之冪各南北步為廣邑方為袤故連兩廣為法從並以為隅外之冪也今有邑方一十里邪向東北北孔刻作門李刻同案北義較長邑半方自南門至故置邑方半之誤今半方南門東至隅五里半邑者謂為小股也求以為出南門

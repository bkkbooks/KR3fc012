body:
  text: 得使頭位常相與異名常誤當觀其每與上下互相取位脫下字欲因減數以相去耳減誤成本與第一問同脫一問同三字今有上禾五秉以一斗一升爲差脫以字以正負術入之術誤行然而或減或益或減誤擧率各自併減之差減誤實差誤羞今有上禾六秉差實者上禾之餘實上誤下今有牛五羊二當相乘左右行定脫左字更置右行牛十羊四脫右行孔刻同今有賣牛二羊五次置牛五負羊六正豕八正脫置字牛五羊六豕八竝誤倒以正負術入之負下衍求字故但互買賣算而已算誤等先令牛二徧乘中行牛二誤倒中誤左孔刻同方將以別實加適足之數適誤不孔刻同正見正或負見負見正誤見法今有五家共井不足如乙一綆乙一誤倒不足如丙一綆如誤以下同用逮之數以法除實者案此九字孔刻無永樂大典本有戊一十二積七百二十一脫戊一十二丙負無入正其一丙戊三十六同名加積負上脫丙字戊上衍同名加戊下衍爲字六下脫同名以丙行同名減之同誤異戊一百四十四同名減脫戊一百四十四減誤加今有白禾各不滿斗各誤禾黑五一斗五誤正

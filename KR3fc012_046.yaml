body:
  text: 步數故置邑方半謂從邑心中停也停誤得實如南行率如下衍法字今有木去人所問木去人者見句之股問誤門股下衍於右行三字今有山居木西人去木三里為股率人去木誤去人目孔刻同以句率乘見股如股率而一得句加木之高誤以木高為見股求句加人目之高今有井徑五尺實如法得一寸脫實如法減入徑四寸餘有四尺六寸脫減入徑四寸餘有七字問井深者問誤開今有戶不知高廣問戶高廣邪各幾何邪誤袤孔刻同戶邪為弦邪誤袤凡並句股之羃即為弦羃誤凡句之在股舉表矩而方之方誤端則兩端之廉廉誤邪句弦差為袤差誤並其外之靑矩矩誤可知故以股弦差加之脫之字得戶邪邪誤袤今有方堡壔案此條前一行當有商功二字今有方亭四面塹堵各一下衍上方自乘亦得中央立方一凡十一字立方三誤立三方十二與三更差次之脫二與今有圓亭四百七十一分尺之一百一十六也七十一誤七一令上下徑相乘徑下衍分母二字孔刻同此合分母三相乘得九下孔刻有分母各自乘亦得九

body:
  text: 石齊其粟同其米粟誤乘即為米斗數斗誤石今有人當稟粟故云併之得三九分之八十字重衍粟二斛為所有數脫有字當粟三十五也當下衍為字今有取傭是為負鹽一升行二萬里於今有術為所有率誤是為負鹽一升行二萬里得錢四十於今有術為所有率升數乘所行里為法於今有術為所有數也孔刻同以今負鹽至與此同誤作大字於今有術為所有數為誤以脫數字今有負籠答曰五十七返五誤二此術所行步多者得返少所行步少者得返多誤此術所行步少者得返多然則故所行者至今返之率誤然即所行者今返率也故令所得返乘今返之率孔刻同假令空行一日令誤今負重三斗以下與空行同案三當作二蓋以二斗減一斛得八斗以四十里減六十里得二十里是加重八斗退二十里也反之即減重八斗進二十里也各以八約之得減重一斗進二里半沉氏曰此問答術皆誤訂正於後今有負籠重一石一十七斤行七十六步五十返今負籠重一石行百步問返幾何答曰四十三返六十分返之二十三術曰以今所行步數乘今籠重斤數為法故籠重斤數

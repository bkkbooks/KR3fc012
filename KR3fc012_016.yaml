body:
  text: 禾不唯一秉下禾實旣以法爲母則中行下實不以法爲母於率不通故先以法乘其實而同之實誤通令乘下禾秉數脫秉字減於下實脫減字合三位之實合誤令故以二位秉數約之二誤一乃得上禾一位之實脫上禾位誤秉此右行三禾共實合中下禾之實禾誤秉合誤令以中下禾先見之實令乘右行中下禾秉數誤右行之禾秉各求列實列誤別餘如上禾秉數而一上誤下上禾盡而止上禾二字誤作小字每秉得二斗餘九秉誤束下同九誤尤今有上禾七秉雖以損益爲説脫以損益爲説互乘兩行乘誤秉今有上禾二秉法實數相推求之術法實孔刻作左右李氏云永樂大典作法實而其幷減之勢不得廣通幷誤必廣孔刻作交案永樂大典亦作廣各有併減之差見于下焉減誤實差誤羞焉誤馬差實雖分差誤羞然則其正無入負之負無入正之其率不妄也正無入下衍以字脫負無入正之五字入作人孔刻作入李氏以爲非是案此本賣牛羊條下注云古本誤無人者非則楊氏亦從入今竝改爲去頭位也去誤法孔刻同益行減行當各以其類矣李氏云益當作以故黑用黑對則除黑上黑字誤赤孔刻同理無同異一也異下衍而字其異名相除除誤助然則可

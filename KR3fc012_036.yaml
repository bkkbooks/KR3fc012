body:
  text: 股十五尺長邪問闊邪誤袤今有木長二丈以七周乘三尺尺誤圍孔刻同據圍廣木長求葛之長誤據圍廣求從為木長者則每周之間間誤開則其間木長為股至為弦五自乘冪誤則其間葛靑七弦周乘三圍並合衆句以為一句木長而股短術云木長謂之股言之倒句五與股求弦亦無圍二十五靑弦之自乘冪出上第一圖圖誤圍謂倒互於弦冪之中互誤在孔刻同可更相表裏居裏者誤可更相乘者孔刻作可更相裏者亦誤其居表者者誤靑表裏形訛而數均表裏誤靑言朱卷居表誤靑卷白裏孔刻同股弦並為袤並誤併靑卷居表居誤白孔刻同今有池方一丈以句及股弦差求股弦誤以句弦見股故令句自乘脫句字餘為倍股弦差乘股長之矩冪誤則除之倍差為短冪之廣脫倍字水深是股案此下當脫欲先見葭長者出水一尺自乘以加於半池方自乘倍出水除之即得凡二十七字義得兩通仍之以股弦較自乘脫較字今有立木係索其末末誤地六分尺之一六孔刻作二十一非與開門去閫者句及股弦差求股弦同一術脫與脫求股弦以除矩冪矩誤此加差於並則成兩索長於誤者脫兩索其減差於並而半之得木長

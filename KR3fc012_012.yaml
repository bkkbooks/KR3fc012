body:
  text: 求駑馬行者以十四乘半里又半之以減駑馬初日之行數以乘十五日之凡行孔刻同所得加前里即駑馬定行里加誤如脫行字以半法增殘分脫半字按令十五日令誤今據良馬十五日據誤按凡行一千四百二里半二里誤二十里並良駑二馬所行脫並脫二脫行以盈不足維乘假令之數並而為實並盈不足為法脫維乘以下十六字維上衍之字以二馬初日所行里初日誤初一日乘十五日為十五日平行數日下衍者為下衍行數下衍又為求初末益疾減遲之數者至為中平之積誤初未益疾減遲之數而以十四乘之者各為中平之積減益疾之數得一十五日定行里得誤各脫定字里誤數若求後一日以十六日之定行里數脫一日以定誤中如日分母而一各得日分子之定行里數一下衍者字定誤中奇半里者誤分可半者故破半里為法以增殘分脫半脫殘乃是六千里術千誤十併兩馬共行六千一百四十里脫併字一誤六課於六千多一百四十脫一字求駑馬行者者誤日今有人持錢三十七萬一千二百九十三分錢之二十八萬六千四百一十七分誤文術曰至八分李雲門曰術文下有脫文當云以盈不足維乘假令之數並而為實並盈不足為法實如法而一得本持錢以減五返

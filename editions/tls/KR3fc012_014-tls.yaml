body:
  text: 歸錢餘卽利案此或者文未補又加利爲一萬七千三百五十五脫三百除第五返歸留合一萬錢合誤餘又加利爲四萬五千三百九十錢脫五千故曰多曰下衍是字今有垣厚大鼠穿三尺四寸十七分寸之十二二誤一大鼠日倍至卽合所問也孔刻誤作大字李氏云是注文混入術中與此合大鼠所穿合四尺五寸孔刻脫四字以後一日所穿乘日分子穿誤求卽各得日分子之中所穿卽誤者謂方者數之形也案自此以下皆方程題謂字上當有方程二字今有上禾三秉程課程也案上當有方程二字中左禾列如右方左誤下爲術之意誤作大字如是疊令左右行相減疊誤直減誤同先令右行上禾乘中行脫禾字謂中行直減左行也直減孔刻作亦乘疑誤復去左行首誤作大字亦令兩行相去行之中禾也誤作大字相去孔刻作相乘去疑誤左方下禾不盡者下誤上當以禾秉數爲法數下衍以字列此中下禾之秉實中誤以孔刻脫除其下實卽斗數矣卽斗誤則計以法乘中行下實乘誤秉此謂中下兩禾實脫下字左方下禾雖去一秉以法爲母於率不通案此條與孔刻互異十數字義得兩通孔刻云左方下

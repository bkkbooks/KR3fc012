body:
  text: 今有甲禾其過者幾何如乙一秉重矣幾何誤何云互其算令相折除互下衍言字除下衍而一差實者如甲禾餘實脫差字禾誤未乙一負重一字丙八正同名加誤同名加丙八正八誤入欲去乙者去誤者百二石正石誤十今有麻九斗此麻麥與均輸少廣章之重衰積分章之誤倒徒用本術者徒誤從或用算而布氈算誤布反欲以多爲貴貴誤實莫不闇於設通闇誤同不可謂要約要約誤倒游刃理間間誤問將亦啟導疑意亦誤六以正負術入之負術誤倒更置減行及其下實減誤成以下實爲實下實誤下置置羣物通率爲列衰列誤例更置減行羣物之數減誤成以減行下實乘列衰減誤成以法減第二行減誤治又以減右行下位右誤二次第四行去左行下位去左誤倒次以右行減第二行頭位脫下行字次以左行去第二行下位位誤五是爲麻四當麥七麥誤麻案自先置第三行至是爲相當之率擧矣原本多脫誤孔刻同李氏本載戴金溪李尙之各校一術今錄於左戴校一術細草併附先置第四行以減第三行反減第四行去其頭位次置第二行以第三行減第二行去其頭位次置右行及左

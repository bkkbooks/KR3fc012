body:
  text: 卽爲麻價率七而麥價率四脫爲脫七而麥價率四又菽五當答三卽爲菽價率三而答價率五脫又菽至率三凡十二字孔刻同幷脫而答價率五五字而黍價率六而率通矣六下衍答價率五又答六當黍五卽答價率五也凡十六字餘有麻一斗菽四斗正脫正字孔刻同下實四正誤黍四斗五以菽率三答率五各乘菽答斗數答誤黍五誤四脫各乘菽答斗數菽得一斗七分斗之五正答得二斗七分斗之一負脫菽脫五正答得二斗七分斗之置下實四爲實脫下實二字實得二十八而分子化爲法矣實上法上竝衍答字卽麻一斗之價麻誤麥皆以其斗數乘之其斗數誤麻以麻率七爲法麻誤實所得卽同爲麻之數同誤各麻之數誤實餘爲法又置下實誤餘爲減或置餘乘列衰所得各爲實衰下衍爲實二字此可以實約法實誤置各以列衰如所約知其價誤各以列衰爲實一百一十六一十誤二十九十五十誤百今有句三尺案此條前一行當有句股二字令出入相補令誤今開方除之至卽句也竝誤作大字則餘在者脫在字中有一股一句積股誤般句股生變圖句弦較弦誤股弦十七步闊邪求長邪誤袤長誤高

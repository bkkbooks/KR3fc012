body:
  text: 誤歲後年得錢十二也十二誤倒同畝爲所求率畝誤故是爲得田六十畝爲誤也令母互乘子令誤今畝數相乘下衍爲實二字今有程耕治得一百五畝五下衍十字今有人持米出三關二四六相乘爲法相下衍互字孔刻同李氏云凡母互乘子則曰互母相乘子相乘皆不曰互謂今所當稅之本本誤定孔刻同又以五乘之四而一卽中關未稅之本米也十七字脫孔刻同不問中間間誤關則其餘本米三分之二也二誤三求外關所稅之餘求誤欲則當置本持米以二乘之三而一誤則當置三分乘之二而一孔刻同欲知中關欲誤畝分母三十五爲所求率五誤三率誤術今有人持金次關五而稅一六字脫適重一斤適誤過通其所不稅者至一百二十也二十七字脫不問中間間誤關以稅率乘之之誤子九章纂類九章互見目錄粟米乘除六問問誤門盈朒故問糲米持錢之屬問糲誤倒圭田法或半正從以乘廣脫或字斜田法或併兩廣乘半從或併兩廣乘從折半竝脫或字圓田法密率答曰至八十七八誤二

body:
  text: 乘之冪下衍者字令弦自乘倍之爲兩弦冪誤令自乘爲四冪其餘開方除之誤開方除之其餘加差於合而半之爲股脫差脫之句股弦卽高廣邪脫句字邪誤袤孔刻同其實以句股差冪減實誤餘脫差字孔刻同半之開方得弦案此弦字誤當云得句與半較幷圖中二弦冪亦當改作二句與半較幷冪三十四上衍廣字變二句冪及句股較乘句二段句股較冪一段及誤入脫段句二字今有竹高一丈此去本三尺脫本字末折抵地爲弦六字脫以句及股弦幷求股故先令句自乘見矩冪誤以先令自乘之冪而半其餘脫其字三百六十八步三誤一今有二人同所立甲南行十步甲誤中此以南行爲句此以誤倒邪行爲弦下衍幷字句弦幷七欲知弦者當以股自乘爲冪誤句弦率七欲引者當以爲冪加差於幷而半之爲弦以弦減差餘爲句誤加幷之半爲率以率減餘爲句率以句弦幷爲分母句弦幷誤可使案母下孔刻有差爲分子四字誤永樂大典本無故令句弦幷至同其袤也誤故令句弦幷者自乘爲朱黃方相連之分股乘爲靑冪之矩以句弦幷爲袤差爲廣今有相引之直加損同上其圓大體以兩弦爲袤句股爲廣引橫斷其半爲弦率列用率七自乘者句

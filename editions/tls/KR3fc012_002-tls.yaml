body:
  text: 章錄經注原文於前而以其所譔題解釋注此類圖説分附各條之後者也末附以九章纂類則以當時俗傳算法爲綱而分析九章題問以類相從焉據自序詳解八十題今乃九十七題總十二卷今不分卷蓋非原書故其中鈔錄經注亦多不循舊次而世無傳本無從校核儀徵阮相國收藏算書最富而正續疇人傳俱云未見餘可知矣余案九章爲算經之首諸家立術皆自此出而世傳永樂大典及孔氏微波榭二本均不免脫誤鐘祥李尚書細草圖説多所改正方可卒讀而往往與此書暗合則此書誠可貴也且其纂類中所列名目亦足與宋人算書互資考證因屬朱君勉之取孔李二本校其譌脫別爲札記而此書之長於孔刻者亦附見焉是書爲毛君生甫家藏本每葉俱有石研齋鈔本五字卷末有石研齋秦氏印未知秦氏爲何許人也道光壬寅孟夏之月上海郁松年泰峰氏譔

body:
  text: 今有兔先走減先走一百步先誤兔不及三十步爲所有數數誤率今有人持金十二斤十二誤倒償錢五千償誤價案此術置十二斤術下衍得字卽金值也值誤實今術旣以十二斤爲所稅旣誤就故以十乘二斤乘二誤倒五千錢爲所有數千誤十三術原金一十二斤術誤除今有客馬除卽減也卽誤其卽是主人追客還用日率也用日誤倒法二十四分之五者二誤一主人往追用日之分也追誤還日之誤倒則主人追及前用日之分也及前誤客凡是爲客行用日率也客下衍人與主人均五字主人馬行率十三三誤二三百里爲所有數所有誤倒以三百里乘主人均行日分子十三案主人均行日當作客用日蓋主人追客所行里卽客所行里也全分二十四行三百里則用日分子十三行一百六十二里半也於今有術三百里爲所有數十三爲所求率分母二十四爲所有率而今有之卽得也得三千九百里得誤以今有金箠令本末相減令誤今以差率加之差下衍重字孔刻同徧乘列衰徧誤偏而又取此率取誤返孔刻同差率二減之率二誤倒別草併甲戊半之併誤丙

body:
  text: 以左行去右行答位餘約之上爲二下爲一次以右行去第二行下位以第二行去第四行下位又以減左行下位次左行去第二行下位餘上得三下得四是爲麥三當菽四次以第二行減第四行下位次以第四行去第二行下位餘上得四下得七是爲麻四當麥七是爲相當之率擧矣凡改十六字草曰先以第四行麻二斗麥五斗菽三斗答九斗黍四斗直錢一百一十二減第三行麻三斗麥五斗菽七斗答六斗黍四斗直錢一百一十六第三行餘麻一斗正麥空菽四斗正答三斗負黍空下實四正次以第三行減右行麻九斗麥七斗菽三斗答二斗黍五斗直錢一百四十先去其下位右行餘麻二十六斗負麥七斗正菽一百三十七斗負答一百七斗正黍五斗正下空次以第三行減第二行麻七斗麥六斗菽四斗答五斗黍三斗直錢一百二十八先去其下位第二行餘麻二十五斗負麥六斗正菽一百二十四斗負答一百一斗黍三斗正下空次以第三行減第四行麻二斗麥五斗菽三斗答九斗黍四斗直錢一百一十二先去其下位第四行餘麻二十六斗負麥五斗正菽一百九斗負答九十三斗黍四斗正下空又以第三行減左行麻一斗麥三斗菽二斗答八斗黍五斗直錢九十五左行餘麻二十二斗負麥三斗正菽九十斗負答七十七斗黍五斗

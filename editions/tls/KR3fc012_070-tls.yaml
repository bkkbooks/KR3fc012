body:
  text: 馬馬食半半分人之四千四千誤十分錢之一百二十三三誤二均輸法欲令縣勞費相等等誤登內甲縣二萬五百二十戶二萬誤一萬遠輸所二百里二誤一丁縣一萬二千二百戶二百誤一百丁縣四萬五百五十石十誤千車一千六百二十二輛脫下二字傭有別價別價誤力償粟一石直二十二誤三戊縣二萬三千四十算脫算字五人等第均錢五文文誤丈九節竹次第差等竹誤行商功求積法爲壤一萬二千五百尺二誤一城垣堤溝塹渠一千七萬四千五百八十五尺一千誤一十塹堵法曰脫法曰陽馬法曰廣袤相乘相誤杓芻童法如六而一而誤如下廣三丈上廣二丈下上二字孔刻互倒二萬六千五百尺尺誤丈袤四丈丈誤尺盈不足法共買雞共誤人雞價七十雞誤物牛價三貫七百五十文脫價字莞長一尺莞誤筦相逢於二日日誤石大鼠穿穿誤行下同方程法兔二十九二誤三麻一斗一誤二分母子術戊六借甲一一誤乙問井深綆長各幾何

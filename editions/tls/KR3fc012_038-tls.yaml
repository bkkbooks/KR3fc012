body:
  text: 也於誤者脫得木長三字今有立木𡸁索去木八尺自之得六十四尺脫得六十四尺今有垣高一丈與係問同也脫同字垣高一丈敧木齊垣圖案此圖當緃短而橫長今緃長橫短非是今有圓材埋在壁中故鐻長亦半之也誤鐻道長是半也爲股弦差者鐻道也李云句有舛誤鐻道爲句鐻深爲股弦差之半何得云爲股弦差者鐻道也今有開門半門廣爲弦誤門廣爲股孔刻同今卽以兩弦爲廣數卽誤次開門去閫中有二積中誤十今有戶高多於廣又倍之爲冪黃四分之二減實誤又倍爲朱冪黃冪四分之一誤黃冪四半一丈棄四分之三適得四分之一誤棄四分之一得高廣幷數之半脫之字半下衍幷數二字又按此圖冪圖誤圓句股幷自乘至卽得句股誤句股相幷而加其差冪亦減弦冪爲積蓋先見其弦然後知其句與股今適等自乘亦各爲方先見其弦然後知其句與股適等者令自乘亦令爲弦冪令半相多而自乘倍之亦爲弦冪而差數復先此各自乘之而與相乘數各爲門實半之爲句股二冪股下衍弦字二誤三其句股合而自相

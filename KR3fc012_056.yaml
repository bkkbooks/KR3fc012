body:
  text: 乘故步又以返數乘之為實實如法得一返欽裴按原本術文兩今字皆誤作故兩故字皆誤作今答亦因之而誤草曰置今籠重一石展為一百二十斤以今行百步乘之得一萬二千斤為法置故籠重一石一十七斤展為一百三十七斤以故行七十六步乘之得一萬四百一十二又以五十返乘之得五十二萬六百返為實實如法得四十三返一萬二千分返之四千六百以等數二百約子母為六十分返之二十三合問説曰李注云所行步多者得返少所行步少者得返多者行七十六步者五十返則行百步者當三十八返也云然則故所行者今返率也今所行者故返率也令故所得返乘今返之率為實而以故返之率為法者以今所行百步為所有率故所行七十六步為所求率故所得返五十為所有數而今有之得三十八返為所求數是今有術也云因令重者得返少輕者得返多者負一石一十七斤者五十返則負一石者當五十七返十二分返之一也云又因其率以乘法實者以後實乘前實後法乘前法而並除之是重今有之義也若以原術推之以故行七十六步為所有率五十返為所求率今行百步為所有數而今有之得六十五返十九分返之十五是行步多者得返多行步少者得返少也豈有是理乎更以故籠重一百三十七斤為所有率五十返為所

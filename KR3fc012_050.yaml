body:
  text: 下衍高字孔刻同陽馬之冪各居二二誤一孔刻同下廣乘上袤而半之乘下衍之字廣六箇高六箇脫高六箇案廣六箇三字當在上長四箇之上如六而一誤如一而六今有芻童答曰二萬六千五百尺二誤一孔刻同今有圓囷此積猶圓堡壔之積孔刻此積誤此即李氏云即當作積與此合積一千六百二十寸二誤一深一寸寸誤尺今祖疏王莽銅斛文字尺寸分數祖誤粗開平方除之即周平方誤倒即周誤作小字今有均輸粟案此條前一行當有均輸二字發粟為輸誤不以發粟為均故各令行道日數約戶為衰脫道字一旬除乙乙誤一得率戶用車二日四十七分日之三十一孔刻二日誤二百李氏云當作二日與此合求此率以戶當各計車之衰分也率誤戶戶誤率衰誤錢今有均輸卒發卒為輸發卒誤居所孔刻同如縣人數而一至淳風等案為衰誤如縣人數而已為數衰此術似別似誤以孔刻同故存之也下衍各置所當出人數以其居所及行道日數乘之如縣人數而一得戶率人役五日七分日之五三十六字今有均輸粟以一車二十五斛除之脫一字加一斛粟價加一斛之價一竝誤以則凡輸粟取僦錢也

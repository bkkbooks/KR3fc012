body:
  text: 反用合分術今載粟至倉粟誤乘一人日造花瓦脫一人程耕凡一人發七畝程誤種分步之六十六十六誤十步貴賤率除法欲其大小率之欲誤箇五銖欲其貴賤石率之銖誤錢三兩五銖欲其貴賤兩率之三誤五其一石一鈞一十七斤脫一十六銖一錢六誤穴反其率法一千一百四十翭千誤貫翭誤文其九百六十翭翭誤文分率術行酒一斗值一十文以錢三十買醇行酒二斗脫值字三誤一二誤三善田一十二畝半二誤一金重三十五兩七錢半七誤一持錢之蜀賈利十三賈誤價以匹丈斗石斤兩爲率欲石率之石誤右貴賤率入互換其一石一鈞二十七斤脫七字其一石一鈞十七斤脫十字衰分第五則答説必失矣脫失字切詳題初問意詳誤祥當以五四三二一爲差率脫四字牛食馬之半馬食羊之半案牛當作羊羊當作牛如三鄉發徭鄉誤卿衰分法苖主責之脫苗字牛食馬之半馬食羊之半案牛當作羊羊當作牛否則當作牛食馬半之馬食羊半之九章原文本明楊君增兩之字轉覺費解原文云羊食半

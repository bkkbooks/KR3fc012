body:
  text: 今有五人分五錢令上二人所得令誤今謂如立錐如立誤倒各均為一列也列孔刻作例李氏云當作列與此合差得三以通於本率三誤一孔刻同今有竹九節各其平率脫率字本用方程求之程誤乘以少減多餘三十九三誤二加一自乘半之脫自字內減三差積九兩脫減字今有鳧起南海以除南北相去除誤餘今有甲發長安答曰二日十二分日之一脫下日字於本道里則餘分也餘誤除一日甲行五分至之一行誤為分誤日乙行七分至之一行誤併乙先行發二日已行十分日下衍也字減乙原程日餘以乘甲程日餘誤倒減先行二日行誤為今有一人一日為牝瓦三十八枚一人一日為牡瓦七十六枚孔刻上一日誤三日下一日誤二日李氏云永樂大典三日二日皆作一日與此合又牝牡二字孔刻互倒未知孰是此意亦與鳧雁同術亦誤猶淳風等案脫淳風等今有一人一日矯矢鳧飛七日而一至案七當作九得一人日矯矢之數也李氏云末句與上句不屬疑有脫誤術曰以矯羽筈為分母矯誤篁實如法而一脫實字今有假田令畝數互乘錢數令誤今則初假之歲假

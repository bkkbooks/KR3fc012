body:
  text: 求率今籠重一百二十斤爲所有數而今有之得四十三返一百三十七分返之一百九是負重者得返多負輕者得返少也又豈有是理乎知兩次用今有術之得數誤則知原術用重今有之得數誤矣今有乘傳委輸淳風等案脫淳風等用七十分日之一脫用字六爲所有率脫有字以此所得則三返之路所得誤爲術當以三約之誤重以三約三字今有絡絲又絡絲一斤爲練絲十二兩二誤三所得靑絲一斤用練絲之數也脫用字孔刻同故令後實乘前實後誤從又置練絲一斤銖數脫數字今有靑絲一斤爲所有數靑誤練孔刻同靑絲九十九爲所有率靑誤者又一術一誤以以靑絲一斤十二銖爲法斤下衍二字今有惡粟則粺化爲糲又以惡粟二十斗乘之如糲米九斗而一二十一字脫孔刻同今有善行者以善行者一百步乘不善行者乘下衍之字善行者行一百步行誤爲爲追及率脫爲字孔刻同於今有術脫有字今有不善行者善行者追及之脫者字少半里里誤步約之追及率得十脫追及率脫十孔刻同於今有術不善行者先行十里爲所有數十爲所求率二十一字脫孔刻同

body:
  text: 江陰宋景昌勉之氏撰原寫本每葉二十行行二十一字序劉序探賾之暇賾誤頤故枝條雖分而同本幹者本誤木故世雖多通才達學脫才字及因木望山之術木誤本令高八尺令誤今榮序盈朒明隱互之形朒誤朏楊序疊壘積者以形測之形誤刑盈不足據共買物人出八盈三據誤按此問兩設俱見零分零誤虛故以同乘之同乘誤倒孔刻同故以少説約法則為人數約實則為物價誤故以少設約定實則法為人數適足之實故為物價求人數物價盈不足相與同其買物者孔刻其作共即問題中共買物是也與下句置所出率連讀不與上句盈不足相與同連讀此本作其字與上同字連讀作同列其位解亦通以約法實實為物價脫下實字盈朒為法朒誤朏下同或問先有出率而後有盈朒脫後字今有共買物此術意謂至故得人數也原本誤作大字脫以所出率以少減多餘為一人之差以一人之差約衆人之差二十四字案此一條當依孔刻分注上文其一術即物價也下盈三文文誤丈令維乘所出率

body:
  text: 弦之並率故弦減之餘為句率同立處是中停也皆句弦並為率故亦以率同其袤也引橫大典同孔刻作引黃義亦通故以弦股率乘如句率而一脫乘字孔刻同法曰句弦和自乘股率自乘並而半之為弦以減和求句股率乘句弦和率求股案此兩求字皆當作為蓋句弦和自乘股率自乘並而半之為句弦和乘弦以減句弦和冪餘為句弦和乘句股率乘句弦和即句弦和乘股三者皆以句弦和為母故可以互相求也今有句五步令黃冪袤於隅中至共成修冪修下衍之字案此文與孔刻互異義得兩通中方黃為廣脫為廣冪圖方在句中圖誤圓各自成小句股下衍袤字句面之小股至合而成中方誤句中之小股股面之並為中率並句股為廣率脫廣率復令句為中方率以並句股為袤率脫方脫並脫袤則中方又可知可知誤何如而法實有由生矣有下衍法字孔刻同下容圓率下誤不孔刻同以今有衰分言之以誤而似今有句六步答曰四步四誤四十今有句八步朱靑黃冪各二下衍之字則倍之為各四倍之誤田可用畫於小紙紙誤裁股中靑必令立規於橫廣李氏云疑有脫誤句股及邪三徑均及誤又又畫中弦以觀其會其誤除則句股之中成

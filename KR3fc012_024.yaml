body:
  text: 斗正菽三十三斗負答二十九斗黍五斗直錢一百四正右行餘麥一斗正菽九斗負答三斗黍二斗直錢四正次以右行減左行麥三斗正菽二斗負答十一斗黍五斗直錢九十一正左行麥空菽二十五斗答二斗正黍一斗負直錢七十九正又以右行減第二行麥六斗正菽二十四斗負答二十六斗黍三斗直錢一百正第二行麥空菽三十斗答八斗正黍九斗負直錢七十六正又以右行減第四行麥五斗正菽五斗負答十五斗黍四斗直錢一百四正第四行麥空菽四十斗正黍六斗負直錢八十四正半之得菽二十斗正黍三斗負直錢四十二正又以第四行減左行菽二十五斗答二斗正黍一斗負直錢七十九正左行餘菽五斗答二斗黍二斗直錢三十七正次以左行減第四行菽二十斗正黍三斗負直錢四十二正第四行菽空答八斗黍十一斗直錢一百六負又以左行減第二行菽三十斗答八斗正黍九斗負直錢七十六正第二行菽空答四斗黍二十一斗直錢一百四十六負次以第二行減第四行答八斗黍十一斗直錢一百六負第四行答空黍三十一斗正直錢一百八十六正上法下實實如法得六即黍價求答價以第二行黍二十一乘黍價六得錢一百二十六減直錢一百四十六餘錢二十如答四而一得五即答價求菽價以左行答二乘答價五得錢十黍二

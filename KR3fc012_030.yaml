body:
  text: 下實錢三正次以左行減第三行下位第三行餘麻二十三斗正麥三斗負菽九十四斗正答八十斗黍五斗負下實錢一正次以第三行去左行下位左行餘麻九十一斗負麥一十二斗正菽三百七十二斗負答三百一十七斗黍二十斗正下空既減訖廢去第三行不用次以第四行去左行下位左行餘麻三十九斗正麥十三斗負菽一百七十三斗正答一百四十八斗負下空次以第四行減右行下位右行麻空麥二斗正菽二十八斗負答十四斗黍一斗正次以右行去第二行及第四行下位第二行餘麻二十五斗負麥空菽四十斗負答五十九斗正下空第四行餘麻二十六斗麥三斗負菽三斗答三十七斗正下空次以第二行減第四行及左行頭位第四行餘麻一斗麥三斗負菽四十三斗正答二十二斗負左行餘麻十四斗正麥十三斗負菽一百三十三斗正答八十九斗負次以第四行減左行菽位左行餘麻十七斗正麥四斗負菽四斗正答二十三斗負次以左行減第二行頭位第二行餘麻八斗麥四斗菽三十六斗負答三十六斗正各位可再半即以四除之第二行得麻二斗麥一斗菽九斗負答九斗正次以第四行去左行及第二行頭位左行麻空麥五十五斗負菽七百三十五斗正答三百九十七斗負第二行麻空麥五斗正菽九十五斗負答五十三斗正次以第

body:
  text: 深綆誤倒正負法負無入入誤人皆過石石誤右丙四重多甲一一誤乙句股第九三十八問至本章二十四寫本誤在旁要二下賈憲立成釋鎖平方法爲方法以方法命上商除實二乘方法爲廉法一退下法再退續商二十六字脫據算術補積二萬五千二百八十一步二萬誤一萬答曰一百三十五步八字脫股弦較與句求弦法以股弦較自乘減之脫較字實如法而一得股股得股案題係求弦而法數乃求股未免疏舛股弦和與句求股法弦誤句與誤爲句弦較股弦較求句股法斜袤一丈丈誤尺餘句股求容積法曰容誤客曰誤四木去右前表三百三十三尺三分尺之一右誤又脫下尺字詳解九章算法札記

body:
  text: 二齊之二十一者是三假令而凡朒十二並七假令合為一實故亦並三四為法九十一字與上故米問同即得日數數誤各得令之六日有餘一尺二寸脫令字寸字今有蒲生莞生一日莞誤芫下同故曰有餘以盈不足乘除之有餘誤多盈誤乘又以後一日後誤故故各增二日定長脫日定孔刻同據李校補以第三日長七寸半寸誤日今有醇酒有餘一十一十誤倒據醇酒二升據誤按此問已有重設及其齊同之意也設誤説孔刻同據李校改脫其字意字令之醇酒二升至故曰不足誤作大字醇酒五升至不足二文誤注故曰不足之下今有大器小器容二十四分斛之七孔刻脫容字以減三斛三誤二大器一容五斗脫容五斗孔刻同據李校補故曰小器二斗五升二誤一以盈不足維乘之各並為實並盈不足為法脫之下十一字小二十四十四誤倒今有漆實如法而一得出漆升數求油及和漆者四五各為所求率脫一字出字求油及和漆者六字各誤合令之出漆一斗二升有餘二升脫有餘二升一斗二升二誤一今有玉並重一十一斤脫下一字玉重而石輕上衍

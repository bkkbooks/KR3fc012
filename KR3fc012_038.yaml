body:
  text: 也於誤者脫得木長三字今有立木𡸁索去木八尺自之得六十四尺脫得六十四尺今有垣高一丈與係問同也脫同字垣高一丈敧木齊垣圖案此圖當緃短而橫長今緃長橫短非是今有圓材埋在壁中故鐻長亦半之也誤鐻道長是半也為股弦差者鐻道也李云句有舛誤鐻道為句鐻深為股弦差之半何得云為股弦差者鐻道也今有開門半門廣為弦誤門廣為股孔刻同今即以兩弦為廣數即誤次開門去閫中有二積中誤十今有戶高多於廣又倍之為冪黃四分之二減實誤又倍為朱冪黃冪四分之一誤黃冪四半一丈棄四分之三適得四分之一誤棄四分之一得高廣並數之半脫之字半下衍並數二字又按此圖冪圖誤圓句股並自乘至即得句股誤句股相並而加其差冪亦減弦冪為積蓋先見其弦然後知其句與股今適等自乘亦各為方先見其弦然後知其句與股適等者令自乘亦令為弦冪令半相多而自乘倍之亦為弦冪而差數復先此各自乘之而與相乘數各為門實半之為句股二冪股下衍弦字二誤三其句股合而自相

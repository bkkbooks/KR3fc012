body:
  text: 環田法外周一百二十二步脫下二字外周一百一十三步二分步之一二誤三古注田環而不通匝過周三徑一之率脫而脫通匝故徑十二步三分步之二三誤四之二誤之一為田三畝田誤畝七百一十七誤四百二十七為田二畝二百三十二步三誤二課分法四十五分之三十一一誤二二十一分之八多八下衍者字平分法各自為列實五字脫以法命平實脫實字乘分法答曰九分步之四脫步字除分法八分錢之一脫錢字互換乘除法答曰八斗二升二十五分升之一十四脫二升一十誤二十問為糱幾何糱誤糳問為答幾何答誤答問為小䵂幾何小誤少菽二斗問為豉二誤一一十四分升之一十三一十三誤三十一價一百二十八布一匹並脫一字今有錢五百脫今字答曰生絲一十三斤一十一兩一兩誤二兩先取用而求互換於九日歸之日誤月合率使法術引伸引伸誤倒少廣法答曰八十八步七百六十一分步之二百三十一脫下步字答曰八十四步七千一百二十九分千誤十

body:
  text: 今有兔先走減先走一百步先誤兔不及三十步為所有數數誤率今有人持金十二斤十二誤倒償錢五千償誤價案此術置十二斤術下衍得字即金值也值誤實今術既以十二斤為所稅既誤就故以十乘二斤乘二誤倒五千錢為所有數千誤十三術原金一十二斤術誤除今有客馬除即減也即誤其即是主人追客還用日率也用日誤倒法二十四分之五者二誤一主人往追用日之分也追誤還日之誤倒則主人追及前用日之分也及前誤客凡是為客行用日率也客下衍人與主人均五字主人馬行率十三三誤二三百里為所有數所有誤倒以三百里乘主人均行日分子十三案主人均行日當作客用日蓋主人追客所行里即客所行里也全分二十四行三百里則用日分子十三行一百六十二里半也於今有術三百里為所有數十三為所求率分母二十四為所有率而今有之即得也得三千九百里得誤以今有金箠令本末相減令誤今以差率加之差下衍重字孔刻同遍乘列衰遍誤偏而又取此率取誤返孔刻同差率二減之率二誤倒別草併甲戊半之併誤丙
